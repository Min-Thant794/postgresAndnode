services:
  postgres:
    image: postgres:18
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: minthanttun
      POSTGRES_PASSWORD: password
      POSTGRES_DB: connectwithnode
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: