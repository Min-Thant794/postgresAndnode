services:
  app: 
    build: .
    container_name: node-app
    ports:
      - "5050:5050"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      PORT: ${PORT}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
      PGHOST: postgres
      PGDATABASE: ${PGDATABASE}
      PGPORT: 5432
      PEPPER_V1: ${PEPPER_V1}
      PEPPER_V2: ${PEPPER_V2:-}
      SESSION_SECRETS: ${SESSION_SECRETS}
      NODE_ENV: ${NODE_ENV}
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:18
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: minthanttun
      POSTGRES_PASSWORD: password
      POSTGRES_DB: connectwithnode
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: